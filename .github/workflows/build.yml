name: ApexChess Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile ApexChess
      run: g++ -O3 -std=c++17 *.cpp -o apex_chess -pthread

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: apex-chess-binary
        path: apex_chess
