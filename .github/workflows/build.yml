name: ApexChess CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential g++-11

    - name: Compile ApexChess (High-Performance)
      run: |
        g++-11 -O3 -std=c++17 -march=native -flto -funroll-loops -ffast-math \
        Bitboard.cpp MoveGen.cpp Position.cpp Search.cpp Evaluation.cpp \
        NNUE_Architecture.cpp UCI_Interface.cpp Main.cpp \
        -o apex_chess_linux -pthread -static-libstdc++ -static-libgcc

    - name: Upload Linux Binary
      uses: actions/upload-artifact@v3
      with:
        name: apex-chess-linux-x64
        path: apex_chess_linux

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Compile ApexChess (Windows EXE)
      run: |
        g++ -O3 -std=c++17 -flto -funroll-loops -ffast-math \
        Bitboard.cpp MoveGen.cpp Position.cpp Search.cpp Evaluation.cpp \
        NNUE_Architecture.cpp UCI_Interface.cpp Main.cpp \
        -o apex_chess_win.exe -pthread -static-libstdc++ -static-libgcc

    - name: Upload Windows Binary
      uses: actions/upload-artifact@v3
      with:
        name: apex-chess-win-x64
        path: apex_chess_win.exe

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
    - uses: actions/checkout@v3
    - name: Setup Pages
      uses: actions/configure-pages@v3
    - name: Upload Web Interface
      uses: actions/upload-pages-artifact@v1
      with:
        path: '.'
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
